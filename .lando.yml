name: mt-starter-kit
recipe: laravel
config:
  php: "8.4"
  webroot: public
services:
  appserver:
    build_as_root:
      - apt-get update -y && pecl install pcov && docker-php-ext-enable pcov
    build:
      - composer install
  database:
    portforward: 3307
  node:
    type: node:24
    build_as_root:
      - npm install -g npm@latest
    build:
      - npm ci

tooling:
  npm:
    service: node
  npx:
    service: node
  node:
    service: node
